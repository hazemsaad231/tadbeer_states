<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 70" width="200" height="70">
  <!-- Background shapes (نفس ستايل اللوجو الأصلي) -->
  <g>
    <!-- Purple rounded square -->
    <rect x="10" y="15" width="35" height="35" rx="8" fill="#6B539E" opacity="0.9"/>
    
    <!-- Blue accent -->
    <rect x="15" y="20" width="12" height="8" rx="2" fill="#64C5F0"/>
    
    <!-- White letter "ت" stylized -->
    <g fill="white">
      <circle cx="27.5" cy="35" r="8"/>
      <rect x="23" y="30" width="9" height="3" rx="1.5"/>
    </g>
  </g>
  
  <!-- Text "تدبير" بخط واضح -->
  <g transform="translate(60, 20)">
    <text 
      font-family="Arial, sans-serif" 
      font-size="32" 
      font-weight="bold" 
      fill="#363463"
      text-anchor="start"
    >
      تدبير
    </text>
    
    <!-- Tagline -->
    <text 
      font-family="Arial, sans-serif" 
      font-size="11" 
      fill="#6B7280"
      text-anchor="start"
      y="25"
    >
      المؤشرات المالية الذكية
    </text>
  </g>
</svg>
